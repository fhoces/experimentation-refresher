# The Problem: An Underpowered Experiment

A ride-sharing platform runs an A/B test: does a new splash screen increase rider sign-ups? They test on 200 users per arm for one week.



--

Result: p = 0.38. "No significant effect. Kill the feature."

--

But the true effect **is** 2 percentage points (a 20% relative lift!). With only 200 per arm, the experiment had **9% power** -- it almost never would have detected the real effect.

--

.highlight-box[
**The most common mistake in experimentation is running underpowered tests.** You don't learn "the feature doesn't work" -- you learn nothing.
]

---

# What Is Statistical Power?

.blue-box[
**Power** = `\(P(\text{reject } H_0 \mid H_1 \text{ is true})\)` -- the probability of detecting a real effect when it exists.
]

--

&lt;img src="slides_files/figure-html/power-diagram-1.png" style="display: block; margin: auto;" /&gt;

---

# The Four Knobs

Power depends on exactly **four** things:

| Knob | Turn it this way | Power goes... |
|------|-----------------|---------------|
| Effect size `\((\delta)\)` | Larger | Up |
| Sample size `\((n)\)` | Larger | Up |
| Variance `\((\sigma^2)\)` | Smaller | Up |
| Significance level `\((\alpha)\)` | Larger | Up |

--

The formula for a two-sample test with equal arms:

`$$n_{\text{per arm}} = \frac{(z_{1-\alpha/2} + z_\beta)^2 \cdot 2\sigma^2}{\delta^2}$$`

--

.highlight-box[
**But you should rarely use this formula.** Simulation-based power analysis is more flexible, more intuitive, and handles real-world complications (clustering, non-normal outcomes, covariates).
]

---

# Simulation-Based Power Analysis

The idea is dead simple:

1. **Simulate** data under `\(H_1\)` (with a known effect)
2. **Analyze** it the way you would analyze the real experiment
3. **Check** if you reject `\(H_0\)`
4. **Repeat** 1,000+ times. Power = fraction of rejections.

--


```r
sim_power &lt;- function(n_per_arm, effect, baseline = 0.10, nsim = 2000) {
  rejections &lt;- map_lgl(1:nsim, function(i) {
    control &lt;- rbinom(n_per_arm, 1, prob = baseline)
    treated &lt;- rbinom(n_per_arm, 1, prob = baseline + effect)
    t.test(treated, control)$p.value &lt; 0.05
  })
  mean(rejections)
}
```

--


```r
sim_power(n_per_arm = 200, effect = 0.02)   # too small
```

```
## [1] 0.104
```

```r
sim_power(n_per_arm = 5000, effect = 0.02)  # much better
```

```
## [1] 0.8875
```

---

# Power Curves: Seeing the Trade-offs

&lt;img src="slides_files/figure-html/power-curve-1.png" style="display: block; margin: auto;" /&gt;

--

You need roughly **5,000-10,000 users per arm** to reliably detect a 2 percentage point lift on a 10% baseline conversion rate.

---

# Minimum Detectable Effect (MDE)

.blue-box[
**MDE** = the smallest effect your experiment can reliably detect (at 80% power, alpha = 0.05).
]

--

The business doesn't ask "what's our power?" They ask:

&gt; "We can run this test for 2 weeks and get 10,000 users per arm. **What's the smallest lift we can detect?**"

--

&lt;img src="slides_files/figure-html/mde-curve-1.png" style="display: block; margin: auto;" /&gt;

# Application: Online Ads

An ad platform wants to test a new ad format. Baseline click-through rate (CTR) is 3%. They want to detect a 2 percentage point lift (to 5%).

--

.pull-left[

```r
# How many impressions per arm?
sizes &lt;- c(100, 200, 500, 1000, 2000)
ads_power &lt;- tibble(
  n = sizes,
  power = map_dbl(sizes, ~ sim_power(
    .x, effect = 0.02,
    baseline = 0.03, nsim = 1000
  ))
)
ads_power |&gt; knitr::kable(digits = 2)
```



|    n| power|
|----:|-----:|
|  100|  0.10|
|  200|  0.17|
|  500|  0.37|
| 1000|  0.62|
| 2000|  0.91|
]

--

.pull-right[
At CTR = 3%, the variance is very low ( `\(p(1-p) \approx 0.03\)` ), so detecting a 2pp absolute lift is easier than at a 50% baseline.

You need about **500-1,000 impressions per arm** -- quite feasible for an ad platform.

But what if you want to detect a **0.1pp** lift? That's ~500,000 per arm.
]

# The Clustering Problem

What if randomization is at the **city level**, not the individual level?

--


```r
sim_power_cluster &lt;- function(n_clusters, n_per_cluster, effect,
                              icc = 0.05, nsim = 1000) {
  rejections &lt;- map_lgl(1:nsim, function(i) {
    cluster_id &lt;- rep(1:n_clusters, each = n_per_cluster)
    treatment &lt;- rep(sample(rep(c(0, 1), each = n_clusters / 2)),
                     each = n_per_cluster)
    # Cluster random effect
    cluster_effect &lt;- rep(rnorm(n_clusters, 0,
                                sd = sqrt(icc / (1 - icc))),
                          each = n_per_cluster)
    y &lt;- rnorm(n_clusters * n_per_cluster,
               mean = treatment * effect + cluster_effect, sd = 1)
    # Cluster-robust inference
    df &lt;- data.frame(y = y, treatment = treatment, cluster = cluster_id)
    coef(summary(lm(y ~ treatment, data = df)))["treatment", "Pr(&gt;|t|)"] &lt; 0.05
  })
  mean(rejections)
}
```

---

# Clustering Kills Power

&lt;img src="slides_files/figure-html/cluster-comparison-1.png" style="display: block; margin: auto;" /&gt;

# The Design Effect and ICC

.blue-box[
**ICC** (Intra-cluster Correlation) = fraction of total variance that is *between* clusters.

**Design effect** `\(= 1 + (m - 1) \times \text{ICC}\)`, where `\(m\)` = cluster size.
]

--


| Cluster size (m)| ICC = 0.01| ICC = 0.05| ICC = 0.10|
|----------------:|----------:|----------:|----------:|
|               10|        1.1|        1.4|        1.9|
|               50|        1.5|        3.5|        5.9|
|              100|        2.0|        6.0|       10.9|
|              500|        6.0|       26.0|       50.9|

--

.highlight-box[
**Design effect** = how many times more samples you need compared to individual-level randomization. With 500 users per cluster and ICC = 0.05, you need **25x** the sample size. Adding more users per cluster barely helps -- you need **more clusters**.
]

---

# Application: Ride-Sharing City-Level Experiment

A ride-sharing company tests the **zone-notification** feature (Modules 1–2) in 20 cities (10 treatment, 10 control), ~500 drivers per city. The ICC for driver accept rate within a city is 0.08.

--

.pull-left[
**Design effect:** `\(1 + (500 - 1) \times 0.08 = 40.9\)`

**Effective sample size:** `\(\frac{10{,}000}{40.9} \approx 245\)` per arm

Even with 10,000 drivers total, you effectively have 245.
]

--

.pull-right[

| Cities per arm| Power|
|--------------:|-----:|
|             10|  0.80|
|             20|  0.86|
|             40|  0.92|
|             60|  0.96|
|            100|  0.98|

With only 10 cities per arm, power is low even for a large effect (0.15 SD). You need **40+ cities per arm** to get adequate power.
]

---

# More Clusters vs. Bigger Clusters

&lt;img src="slides_files/figure-html/more-vs-bigger-1.png" style="display: block; margin: auto;" /&gt;

# Reducing Variance with Pre-Treatment Covariates

You can boost power without more users by **reducing residual variance**:

`$$n \propto \frac{\sigma^2}{\delta^2} \quad \Rightarrow \quad \text{cut } \sigma^2 \text{ in half} \Leftrightarrow \text{double } n$$`

--


```r
sim_power_covariate &lt;- function(n_per_arm, effect, r_squared, nsim = 1000) {
  rejections &lt;- map_lgl(1:nsim, function(i) {
    x_pre &lt;- rnorm(2 * n_per_arm)
    treat &lt;- rep(c(0, 1), each = n_per_arm)
    y &lt;- sqrt(r_squared) * x_pre + treat * effect +
         rnorm(2 * n_per_arm, sd = sqrt(1 - r_squared))
    coef(summary(lm(y ~ treat + x_pre)))[2, 4] &lt; 0.05
  })
  mean(rejections)
}
cat("Without covariate:", sim_power(2000, effect = 0.1, baseline = 0.5, nsim = 1000), "\n")
```

```
## Without covariate: 1
```

```r
cat("With covariate (R^2=0.3):", sim_power_covariate(2000, effect = 0.1, r_squared = 0.3), "\n")
```

```
## With covariate (R^2=0.3): 0.964
```

--

.highlight-box[
**CUPED preview:** Using pre-experiment data (last week's clicks, last month's rides) as a covariate can reduce variance by 30-50%, equivalent to doubling your sample size for free. Module 5 covers the mechanics.
]

---

# Summary: The Power Checklist

Before running any experiment, answer these:

--

1. **What is the MDE?** What's the smallest effect that matters for the business?

--

2. **What is the baseline rate and variance?** Look at historical data.

--

3. **Is randomization at the individual level or clustered?** If clustered, how many clusters do you have? What is the ICC?

--

4. **Can you reduce variance?** Pre-treatment covariates, stratification, CUPED?

--

5. **How long do you need to run?** More time = more users, but watch out for novelty effects and contamination.

--

.highlight-box[
**Rules of thumb:** (1) 80% power is the standard minimum. (2) You almost always need more samples than you think. (3) For clustered designs, the number of *clusters* matters far more than the number of units per cluster.
]

---

# Key Takeaways

1. **Power** = `\(P(\text{reject } H_0 \mid H_1 \text{ true})\)`. Low power means you learn nothing from a null result.

2. **Four knobs:** effect size, sample size, variance, significance level. You usually control `\(n\)` and can reduce `\(\sigma^2\)`.

3. **Simulation-based power** is more flexible than formulas. Simulate your analysis pipeline directly.

4. **MDE** is the question the business actually asks: "Given our traffic, what can we detect?"

5. **Clustering** destroys power via the design effect `\(1 + (m-1) \times \text{ICC}\)`. Add more clusters, not more units per cluster.

6. **Pre-treatment covariates** can reduce variance dramatically -- a free lunch for power. (Details in Module 5.)

# Backup: Power Formula Derivation .tiny[(for two-sample z-test)]

Under `\(H_0\)`: `\(\bar{Y}_T - \bar{Y}_C \sim N\left(0, \frac{2\sigma^2}{n}\right)\)`

Under `\(H_1\)`: `\(\bar{Y}_T - \bar{Y}_C \sim N\left(\delta, \frac{2\sigma^2}{n}\right)\)`

--

Reject `\(H_0\)` when `\(\frac{\bar{Y}_T - \bar{Y}_C}{\sqrt{2\sigma^2/n}} &gt; z_{1-\alpha/2}\)`

--

Power = `\(P\left(\frac{\bar{Y}_T - \bar{Y}_C}{\sqrt{2\sigma^2/n}} &gt; z_{1-\alpha/2} \;\middle|\; H_1\right)\)`

--

`\(= P\left(Z + \frac{\delta}{\sqrt{2\sigma^2/n}} &gt; z_{1-\alpha/2}\right)\)` where `\(Z \sim N(0,1)\)`

`\(= P\left(Z &gt; z_{1-\alpha/2} - \frac{\delta\sqrt{n}}{\sqrt{2}\sigma}\right)\)`

--

Setting power `\(= 1 - \beta\)` and solving for `\(n\)`:

`$$n = \frac{2\sigma^2 (z_{1-\alpha/2} + z_{1-\beta})^2}{\delta^2}$$`

---
name: icc-derivation

# Backup: ICC and Design Effect

**ICC** = `\(\rho = \frac{\sigma_b^2}{\sigma_b^2 + \sigma_w^2}\)`, where `\(\sigma_b^2\)` = between-cluster variance and `\(\sigma_w^2\)` = within-cluster variance.

--

The variance of the cluster mean is:

`$$\text{Var}(\bar{Y}_{c}) = \frac{\sigma_w^2}{m} + \sigma_b^2$$`

--

The variance of the treatment effect estimator with `\(J\)` clusters per arm of size `\(m\)`:

`$$\text{Var}(\hat{\tau}) = \frac{2(\sigma_w^2 + m\sigma_b^2)}{Jm} = \frac{2\sigma^2}{Jm} \cdot [1 + (m-1)\rho]$$`

--

The term `\(\text{DEFF} = 1 + (m-1)\rho\)` is the **design effect**. It inflates the variance relative to individual-level randomization.

Effective sample size: `\(n_{\text{eff}} = \frac{Jm}{\text{DEFF}}\)`

---
name: mde-formula

# Backup: MDE Formula

From the power formula, solving for `\(\delta\)` instead of `\(n\)`:

`$$\text{MDE} = (z_{1-\alpha/2} + z_{1-\beta}) \cdot \sqrt{\frac{2\sigma^2}{n}}$$`

--

For a binary outcome with baseline `\(p\)`:

`$$\text{MDE} = (z_{0.975} + z_{0.80}) \cdot \sqrt{\frac{2p(1-p)}{n}} \approx 2.8 \cdot \sqrt{\frac{2p(1-p)}{n}}$$`

--

For clustered designs, multiply the standard error by `\(\sqrt{\text{DEFF}}\)`:

`$$\text{MDE}_{\text{clustered}} = (z_{1-\alpha/2} + z_{1-\beta}) \cdot \sqrt{\frac{2\sigma^2 \cdot [1 + (m-1)\rho]}{Jm}}$$`
